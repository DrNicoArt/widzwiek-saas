# Widźwięk — stack jednego hosta. RDZEŃ teraz = worker (transkrypcja+dźwięki+WCAG+eksport).
# Sekrety przez .env (NIE commitować). Frontend zwykle na Vercelu (osobno), ale można i tu.
services:
  worker:
    build: ../worker            # realny worker (FastAPI). Obraz: worker/Dockerfile
    environment:
      PIPELINE_MODE: ${PIPELINE_MODE:-auto}        # auto = faster-whisper (lokalnie, bez API)
      WIDZWIEK_CORS_ORIGINS: ${WIDZWIEK_CORS_ORIGINS:-http://localhost:3000}
      WIDZWIEK_ADMIN_TOKEN: ${WIDZWIEK_ADMIN_TOKEN:-}
    volumes:
      - workerdata:/data         # joby (storage) + modele Whisper (cache)
    ports:
      - "8000:8000"
    restart: unless-stopped

  # Frontend opcjonalnie tu; docelowo na Vercelu z NEXT_PUBLIC_WORKER_URL -> adres workera.
  # web:
  #   build: ../web
  #   environment:
  #     NEXT_PUBLIC_WORKER_URL: http://worker:8000
  #   ports: [ "3000:3000" ]
  #   depends_on: [ worker ]

  # === PRZYSZŁOŚĆ (konta/płatności/skala) — odkomentuj przy Krokach 2/3/6 ===
  # db:      { image: postgres:16, environment: { POSTGRES_DB: widzwiek, POSTGRES_USER: widzwiek, POSTGRES_PASSWORD: ${POSTGRES_PASSWORD} }, volumes: [ "pgdata:/var/lib/postgresql/data" ] }
  # redis:   { image: redis:7 }
  # storage: { image: minio/minio, command: server /data, volumes: [ "miniodata:/data" ] }

volumes:
  workerdata: {}
  # pgdata: {}
  # miniodata: {}
